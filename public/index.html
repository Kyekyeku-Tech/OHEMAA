<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ohemaa Digital Hub</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./logo.png">

  <style>
    .whatsapp-wrapper {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 9999;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .status-bubble {
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      padding: 7px 12px;
      border-radius: 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,.7); }
      70% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .typing span {
      animation: blink 1.4s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0% { opacity: .2 }
      20% { opacity: 1 }
      100% { opacity: .2 }
    }

    .whatsapp-float {
      width: 60px;
      height: 60px;
      background-color: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      transition: transform .2s ease;
      text-decoration: none;
    }

    .whatsapp-float:hover {
      transform: scale(1.08);
    }

    .whatsapp-float img {
      width: 34px;
      height: 34px;
    }

    @media (max-width: 480px) {
      .status-bubble {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- WHATSAPP FLOAT + STATUS -->
  <div class="whatsapp-wrapper">
    <div class="status-bubble">
      <span class="online-dot"></span>
      <span id="adminStatusText">Admin online</span>
      <span class="typing">
        <span>.</span><span>.</span><span>.</span>
      </span>
    </div>

    <a
      href="https://wa.me/233547253430?text=Hello%20I%20need%20help%20with%20my%20order"
      class="whatsapp-float"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Chat with Admin on WhatsApp"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
        alt="WhatsApp"
      />
    </a>
  </div>

  <!-- AUTO STATUS SCRIPT -->
  <script>
    const messages = [
      "Admin chatting Fred",
      "Admin chatting San",
      "Admin chatting Sam",
      "Admin free — reply fast",
      "Admin online now"
    ];

    let index = 0;
    const statusEl = document.getElementById("adminStatusText");

    setInterval(() => {
      index = (index + 1) % messages.length;
      statusEl.textContent = messages[index];
    }, 3000); // change every 3 seconds
  </script>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
</body>
</html>
